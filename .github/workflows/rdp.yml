name: Windows-RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Create User
      run: |
        net user gostdtgamer "31Mar2010!" /add
        net localgroup administrators gostdtgamer /add

    - name: Enable RDP
      run: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Start Tunnel
      run: |
        ssh -tt -p 443 -R0:localhost:3389 tcp@a.pinggy.io
